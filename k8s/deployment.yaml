apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resume
  template:
    metadata:
      labels:
        app: resume
    spec:
      containers:
        - name: resume-container
          image: ACR_IMAGE_PLACEHOLDER  # Jenkins will replace this
          ports:
            - containerPort: 80
          env:
            - name: APP_KEY
              value: "base64:8M3vqkuFMx4jMt7TPSm5wSy/zYdP23KV1MhTQM1jKfQ="
            - name: APP_DEBUG
              value: "true"
            - name: SESSION_DRIVER
              value: "array"
            - name: CACHE_STORE
              value: "array"
